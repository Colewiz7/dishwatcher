services:
  dishwatcher:
    build: .
    container_name: dishwatcher
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./images:/app/images
      - ./data:/app/data
      - ./static:/app/static
    environment:
      - DISH_API_KEY=changeme
      - YOLO_MODEL_PATH=/app/yolov8n.pt
      - CONFIDENCE_THRESHOLD=0.40
      - IMAGE_SAVE_DIR=/app/images
      - CAMERA_ROTATION=180
      - CONSENSUS_WINDOW=7
      - CONSENSUS_THRESHOLD=5
      - GRACE_MINUTES=90
      - DB_PATH=/app/data/dishwatcher.db
      - DUAL_PASS_ENABLED=true
      # discord alerts (optional, fill in to enable)
      # - DISCORD_WEBHOOK_URL=https://discord.com/api/webhooks/...
      # - DISCORD_MENTION=<@your_user_id>
      # - NOTIFY_COOLDOWN_MIN=30

    # reverse proxy labels (uncomment + edit for your domain)
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.dishwatcher.rule=Host(`dishes.yourdomain.com`)"
    #   - "traefik.http.routers.dishwatcher.entrypoints=websecure"
    #   - "traefik.http.routers.dishwatcher.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.dishwatcher.loadbalancer.server.port=8000"
